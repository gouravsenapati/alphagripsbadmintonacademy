<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaGrips Admin</title>
    <link rel="stylesheet" href="./css/dashboard.css" />
    <script>
      (function () {
        const token = localStorage.getItem("token");
        const isParentRole = function (roleValue) {
          return String(roleValue || "").toLowerCase().startsWith("parent");
        };
        const isParentRoleId = function (roleIdValue) {
          return String(roleIdValue || "") === "4";
        };
        const decodeRoleFromToken = function (jwtToken) {
          try {
            const payload = jwtToken.split(".")[1];
            const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
            const decoded = JSON.parse(atob(normalized));
            return {
              role: String(decoded.role || decoded.role_name || "").toLowerCase(),
              roleId: String(decoded.role_id || "")
            };
          } catch (error) {
            return { role: "", roleId: "" };
          }
        };
        const tokenMeta = decodeRoleFromToken(token || "");
        const role = tokenMeta.role || String(localStorage.getItem("role") || "").toLowerCase();
        const roleId = tokenMeta.roleId || String(localStorage.getItem("role_id") || "");

        if (!token) {
          window.location.replace("/Public/login.html");
          return;
        }

        if (isParentRole(role) || isParentRoleId(roleId)) {
          window.location.replace("/Public/parent/index.html");
        }
      })();
    </script>
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="topbar-left">
          <button onclick="toggleSidebar()" class="menu-btn" aria-label="Toggle navigation">
            ☰
          </button>
          <div>
            <p class="brand-kicker">AlphaGrips</p>
            <h1>AlphaGrips Admin</h1>
          </div>
        </div>
        <div class="topbar-right">
          <button onclick="logout()" class="btn btn-ghost">Logout</button>
        </div>
      </header>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <p class="brand-kicker">Control Center</p>
          <strong>AlphaGrips</strong>
        </div>
        <nav>
          <a href="#players" data-route="players">Players</a>
          <a href="#academies" data-route="academies" data-manager-only>Academies</a>
          <a href="#users" data-route="users" data-manager-only>Staff</a>
          <a href="#categories" data-route="categories">Categories</a>
          <a href="#fee-plans" data-route="fee-plans">Fee Plans</a>
          <a href="#invoices" data-route="invoices">Invoices</a>
          <a href="#payments" data-route="payments">Payments</a>
          <a href="#receipts" data-route="receipts">Receipts</a>
          <a href="#batches" data-route="batches">Batches</a>
          <a href="#player-batches" data-route="player-batches">Batch Assignments</a>
          <a href="#attendance" data-route="attendance">Attendance</a>
          <a href="#fitness" data-route="fitness">Fitness</a>
          <a href="#match-matrix" data-route="match-matrix">Match Matrix</a>
          <a href="#player-match-log" data-route="player-match-log">Player Match Log</a>
        </nav>
      </aside>

      <main id="app"></main>
    </div>

    <script type="module" src="./js/router.js"></script>
  </body>
</html>
