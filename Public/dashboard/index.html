<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaGrips Admin</title>
    <link rel="stylesheet" href="./css/dashboard.css" />
    <style>
      .session-chip {
        display: grid;
        gap: 2px;
        min-width: 0;
        max-width: 240px;
        padding: 7px 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: #f7f4ef;
        text-align: right;
      }

      .session-chip-label {
        font-size: 0.62rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(247, 244, 239, 0.72);
      }

      .session-chip strong {
        font-size: 0.84rem;
        line-height: 1.15;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .session-chip-meta {
        font-size: 0.72rem;
        color: rgba(247, 244, 239, 0.76);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      @media (max-width: 900px) {
        .session-chip {
          display: none;
        }
      }
    </style>
    <script src="../shared/portalAccess.js"></script>
    <script>
      (function () {
        const access = window.AGPortalAccess;
        const { token, role, roleId } = access.getStoredAuthMeta();

        if (!token) {
          window.location.replace("/Public/login.html?portal=academy");
          return;
        }

        if (!access.isAcademyPortalAllowedRole(role, roleId)) {
          window.location.replace(access.getPortalUrl(access.getPreferredPortal(role, roleId)));
        }
      })();
    </script>
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="topbar-left">
          <button onclick="toggleSidebar()" class="menu-btn" aria-label="Toggle navigation">
            ☰
          </button>
          <div>
            <p class="brand-kicker">AlphaGrips</p>
            <h1>AlphaGrips Admin</h1>
          </div>
        </div>
        <div class="topbar-right">
          <div class="session-chip" id="sessionChip" hidden>
            <span class="session-chip-label" id="sessionRoleLabel">Role</span>
            <strong id="sessionName">User</strong>
            <span class="session-chip-meta" id="sessionAcademy">Academy scope</span>
          </div>
          <button onclick="logout()" class="btn btn-ghost">Logout</button>
        </div>
      </header>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <p class="brand-kicker">Control Center</p>
          <strong>AlphaGrips</strong>
        </div>
        <nav>
          <a href="#players" data-route="players">Players</a>
          <a href="#academies" data-route="academies" data-manager-only>Academies</a>
          <a href="#users" data-route="users" data-manager-only>Staff</a>
          <a href="#categories" data-route="categories">Categories</a>
          <a href="#rankings" data-route="rankings">Rankings</a>
          <a href="#fee-plans" data-route="fee-plans">Fee Plans</a>
          <a href="#invoices" data-route="invoices">Invoices</a>
          <a href="#payments" data-route="payments">Payments</a>
          <a href="#receipts" data-route="receipts">Receipts</a>
          <a href="#batches" data-route="batches">Batches</a>
          <a href="#player-batches" data-route="player-batches">Batch Assignments</a>
          <a href="#attendance" data-route="attendance">Attendance</a>
          <a href="#fitness" data-route="fitness">Fitness</a>
          <a href="#match-matrix" data-route="match-matrix">Match Matrix</a>
          <a href="#player-match-log" data-route="player-match-log">Player Match Log</a>
        </nav>
      </aside>

      <main id="app"></main>
    </div>

    <script type="module" src="./js/router.js"></script>
  </body>
</html>
