<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaGrips Tournament Console</title>
    <link rel="stylesheet" href="../dashboard/css/dashboard.css" />
    <script src="../shared/portalAccess.js"></script>
    <script>
      (function () {
        const access = window.AGPortalAccess;
        const { token, role, roleId } = access.getStoredAuthMeta();
        const canAccessAcademy = access.isAcademyPortalAllowedRole(role, roleId);
        const canManageTournamentStaff = [
          "super_admin",
          "academy_admin",
          "head_coach",
          "tournament_admin",
          "tournament_manager"
        ].includes(String(role || "").toLowerCase());

        window.__AGTournamentConsoleContext = {
          canAccessAcademy,
          canManageTournamentStaff
        };

        if (!token) {
          window.location.replace("/Public/login.html?portal=tournament&redirect=/Public/tournament/index.html#tournaments");
          return;
        }

        const preferredPortal = access.getPreferredPortal(role, roleId);

        if (preferredPortal === "parent") {
          window.location.replace(access.getPortalUrl(preferredPortal));
          return;
        }

        if (preferredPortal === "referee") {
          window.location.replace(access.getPortalUrl(preferredPortal));
        }
      })();

      document.addEventListener("DOMContentLoaded", function () {
        const context = window.__AGTournamentConsoleContext || {};
        const mainDashboardLink = document.getElementById("mainDashboardLink");
        const tournamentStaffNavLink = document.getElementById("tournamentStaffNavLink");

        if (!context.canAccessAcademy && mainDashboardLink) {
          mainDashboardLink.remove();
        }

        if (!context.canManageTournamentStaff && tournamentStaffNavLink) {
          tournamentStaffNavLink.remove();
        }
      });
    </script>
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="topbar-left">
          <button onclick="toggleSidebar()" class="menu-btn" aria-label="Toggle navigation">
            ☰
          </button>
          <div>
            <p class="brand-kicker">AlphaGrips</p>
            <h1>Tournament Console</h1>
          </div>
        </div>
        <div class="topbar-right">
          <a
            class="btn btn-ghost"
            id="mainDashboardLink"
            href="/Public/dashboard/index.html#players"
          >
            Main Dashboard
          </a>
          <button onclick="logout()" class="btn btn-ghost">Logout</button>
        </div>
      </header>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <p class="brand-kicker">Tournament Ops</p>
          <strong>AlphaGrips</strong>
        </div>
        <nav>
          <a href="#tournaments" data-route="tournaments">Tournament Overview</a>
          <a href="#tournament-setup" data-route="tournament-setup">Tournament Setup</a>
          <a
            href="#tournament-staff"
            data-route="tournament-staff"
            id="tournamentStaffNavLink"
          >
            Tournament Staff
          </a>
          <a href="#tournament-brackets" data-route="tournament-brackets">Draws</a>
          <a href="#tournament-operations" data-route="tournament-operations">Operations Desk</a>
          <a href="#tournament-courts" data-route="tournament-courts">Court Monitor</a>
          <a href="#tournament-scoring" data-route="tournament-scoring">Live Scoring</a>
          <a href="#tournament-results" data-route="tournament-results">Results Center</a>
          <a href="/Public/tournament.html#tournamentList">Tournament Hub</a>
        </nav>
      </aside>

      <main id="app"></main>
    </div>

    <script type="module" src="./js/router.js"></script>
  </body>
</html>
